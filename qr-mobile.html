<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Scan QR code to access Farm Harvest & Price Planner on your mobile device" />
    <title>FARM HARVEST & PRICE PLANNER - Mobile QR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/main.css" />
    <style>
        .qr-container {
            max-width: 480px;
            margin: 40px auto;
            padding: 24px;
            text-align: center;
        }
        .qr-image {
            width: 280px;
            height: 280px;
            margin: 20px auto;
            border-radius: 16px;
            border: 4px solid #fff;
            box-shadow: 0 12px 30px rgba(20, 42, 26, 0.15);
            background: #fff;
        }
        .qr-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .qr-selector {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(49, 92, 57, 0.3);
            background: #fff;
            font-family: inherit;
            font-size: 14px;
            margin: 10px 0;
        }
        .instructions {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="qr-container glass-card">
        <h1>FARM HARVEST & PRICE PLANNER</h1>
        <p style="color: var(--muted); margin-top: 8px;">Scan to access on your mobile device</p>
        
        <img id="qrImage" class="qr-image" src="/api/qr/generate?type=dashboard" alt="QR code" />
        
        <select id="qrTypeSelect" class="qr-selector">
            <option value="dashboard">Dashboard / Login</option>
            <option value="register">Registration</option>
            <option value="forecast">Harvest Forecast</option>
            <option value="planner">Market Price Planner</option>
        </select>
        
        <div class="qr-actions">
            <button id="downloadQrBtn" class="secondary-button">Download QR</button>
            <button id="shareQrBtn" class="secondary-button">Share QR</button>
            <button id="refreshQrBtn" class="secondary-button">Refresh QR</button>
        </div>
        
        <p id="qrUrlDisplay" class="instructions"></p>
        <p class="instructions">Point your phone camera at the QR code to access the planner from anywhere.</p>
    </div>

    <script>
        const baseUrl = "https://farm-harvest-price-planner.onrender.com";
        const qrTargets = {
            dashboard: `${baseUrl}/#auth`,
            register: `${baseUrl}/#registerForm`,
            forecast: `${baseUrl}/#planner`,
            planner: `${baseUrl}/#insights`
        };

        function updateQr() {
            const type = document.getElementById('qrTypeSelect').value;
            const url = qrTargets[type];
            document.getElementById('qrImage').src = `/api/qr/generate?type=${type}`;
            document.getElementById('qrUrlDisplay').textContent = url;
        }

        document.getElementById('qrTypeSelect').addEventListener('change', updateQr);
        document.getElementById('refreshQrBtn').addEventListener('click', updateQr);
        document.getElementById('downloadQrBtn').addEventListener('click', () => {
            const type = document.getElementById('qrTypeSelect').value;
            window.location.href = `/api/qr/download?type=${type}`;
        });
        document.getElementById('shareQrBtn').addEventListener('click', async () => {
            const type = document.getElementById('qrTypeSelect').value;
            const url = qrTargets[type];
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Farm Harvest & Price Planner',
                        text: 'Access the farm planner on your mobile device',
                        url: url
                    });
                } catch (e) {
                    console.log('Share cancelled');
                }
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Link copied to clipboard: ' + url);
                });
            }
        });

        updateQr();
    </script>
</body>
</html>
