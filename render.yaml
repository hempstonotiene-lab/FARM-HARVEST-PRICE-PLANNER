services:
  - type: web
    name: farm-harvest-planner
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: farm-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_MAX_AGE_MS
        value: 604800000
      - key: OPEN_METEO_BASE_URL
        value: https://api.open-meteo.com/v1/forecast

databases:
  - name: farm-db
    plan: free
    databaseName: farm_planner
    user: farm_admin