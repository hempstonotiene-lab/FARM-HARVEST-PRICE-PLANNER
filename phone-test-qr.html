<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phone Test QR</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f3ea;
            --card: #ffffff;
            --text: #17301e;
            --muted: #5f725f;
            --accent: #315c39;
            --line: rgba(49, 92, 57, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(224, 138, 46, 0.18), transparent 28%),
                linear-gradient(180deg, #faf7f1 0%, var(--bg) 100%);
        }

        .card {
            width: min(100%, 520px);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 18px 50px rgba(20, 42, 26, 0.1);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }

        p {
            margin: 0 0 14px;
            color: var(--muted);
            line-height: 1.6;
        }

        img {
            width: min(100%, 320px);
            height: auto;
            border-radius: 18px;
            border: 10px solid #fff;
            background: #fff;
            box-shadow: 0 12px 28px rgba(20, 42, 26, 0.08);
        }

        a {
            color: var(--accent);
            font-weight: 700;
            word-break: break-all;
        }

        .url {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(49, 92, 57, 0.06);
            border: 1px solid rgba(49, 92, 57, 0.1);
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>FARM HARVEST &amp; PRICE PLANNER</h1>
        <p>Scan this QR code from your phone while both devices are on the same Wi-Fi network.</p>
        <img src="https://quickchart.io/qr?size=320&text=http%3A%2F%2F10.14.227.95%3A3000" alt="QR code for http://10.14.227.95:3000" />
        <div class="url">
            <p>Direct URL</p>
            <a href="http://10.14.227.95:3000">http://10.14.227.95:3000</a>
        </div>
    </main>
</body>

</html>
